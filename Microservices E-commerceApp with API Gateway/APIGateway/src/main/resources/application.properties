spring.application.name=APIGateway

server.port=8080

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.server.webflux.routes[0].id=customer-route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://CustomerMicroservice
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/customers/**

spring.cloud.gateway.server.webflux.routes[1].id=product-route
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ProductMicroservice
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/products/**

spring.cloud.gateway.server.webflux.routes[2].id=order-route
spring.cloud.gateway.server.webflux.routes[2].uri=lb://OrderMicroservice
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/orders/**

management.endpoints.web.exposure.include=*